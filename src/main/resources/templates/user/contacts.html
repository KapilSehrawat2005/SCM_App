<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
    <title>My Contacts | SCM</title>
</head>
<body>
<div id="content">
    <div th:if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar :: sidebar}"></div>
    </div>

    <div class="sm:pl-64 pt-20 min-h-screen bg-gray-50 dark:bg-gray-900">
        <div class="p-6">

            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">My Contacts</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Manage and browse all your saved contacts.</p>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">

                <div class="p-5 flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-gray-100 dark:border-gray-700">
                    <form data-th-object="${contactSearchForm}" data-th-action="@{'/user/contacts/search'}" class="flex flex-col sm:flex-row items-start sm:items-center gap-3 flex-1">
                        <select data-th-field="*{field}" required
                                class="bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none block p-2.5 min-w-[130px]">
                            <option selected value="" disabled>Select Field</option>
                            <option value="name">Name</option>
                            <option value="phone">Phone</option>
                            <option value="email">Email</option>
                        </select>
                        <div class="relative flex-1 w-full sm:max-w-xs">
                            <input data-th-field="*{value}" type="text" required
                                   class="block w-full pl-9 pr-4 py-2.5 text-sm text-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                   placeholder="Search contacts...">
                        </div>
                        <button type="submit" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-xl transition-colors">
                            Search
                        </button>
                    </form>
                    <button type="button" onclick="exportData()" class="px-5 py-2.5 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-xl transition-colors flex items-center gap-2">
                        <i class="fas fa-file-excel"></i> Export
                    </button>
                </div>

                <div data-th-replace="~{message :: messagebox}"></div>

                <div class="overflow-x-auto">
                    <table id="contact-table" data-th-if="${pageContact.totalElements>0}"
                           class="w-full text-sm text-left text-gray-600 dark:text-gray-400">
                        <thead class="text-xs text-gray-500 dark:text-gray-400 uppercase bg-gray-50 dark:bg-gray-700/50">
                        <tr>
                            <th scope="col" class="px-6 py-4">Contact</th>
                            <th scope="col" class="px-6 py-4">Phone</th>
                            <th scope="col" class="px-6 py-4">Links</th>
                            <th scope="col" class="px-6 py-4">Actions</th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                        <tr data-th-object="${c}" data-th-each="c : ${pageContact.getContent()}"
                            class="bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                            <th scope="row" class="flex items-center px-6 py-4 text-gray-900 dark:text-white whitespace-nowrap">
                                <img onerror="this.src='https://static-00.iconduck.com/assets.00/profile-default-icon-2048x2045-u3j7s5nj.png'"
                                     class="w-10 h-10 rounded-xl object-cover"
                                     data-th-src="@{*{picture}}" src="" alt="">
                                <div class="ps-3">
                                    <div class="text-sm font-semibold" data-th-text="*{name}">Name</div>
                                    <div class="text-xs text-gray-500 dark:text-gray-400 font-normal" data-th-text="*{email}">email</div>
                                </div>
                            </th>
                            <td class="px-6 py-4">
                                    <span class="flex items-center gap-2">
                                        <i class="fa-solid fa-phone text-xs text-gray-400"></i>
                                        <span data-th-text="*{phoneNumber}"></span>
                                    </span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-2">
                                    <div data-th-if="*{favorite}" class="w-2 h-2 rounded-full bg-yellow-400 flex-shrink-0" title="Favorite"></div>
                                    <a data-th-href="@{*{websiteLink}}" target="_blank" class="text-blue-500 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300">
                                        <i class="fa-solid fa-link text-sm"></i>
                                    </a>
                                    <a data-th-href="@{*{linkedInLink}}" target="_blank" class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300">
                                        <i class="fa-brands fa-linkedin text-sm"></i>
                                    </a>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <button th:onclick="deleteContact([[${c.id}]])" class="text-red-400 hover:text-red-600 dark:hover:text-red-400 transition-colors" title="Delete">
                                        <i class="fa-solid fa-trash text-sm"></i>
                                    </button>
                                    <a data-th-href="@{'/user/contacts/view/'+*{id}}" class="text-blue-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" title="Edit">
                                        <i class="fa-solid fa-pen text-sm"></i>
                                    </a>
                                    <button th:onclick="loadContactdata([[${c.id}]])" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors" title="View">
                                        <i class="fa-solid fa-eye text-sm"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div data-th-if="${pageContact.totalElements>0}" class="px-5 py-4 border-t border-gray-100 dark:border-gray-700 flex justify-center">
                    <nav aria-label="Pagination">
                        <ul class="inline-flex -space-x-px text-sm">
                            <li data-th-unless="${pageContact.first}">
                                <a data-th-href="@{'/user/contacts?size='+${pageSize}+'&page=' + ${pageContact.number-1}}" href="#"
                                   class="flex items-center justify-center px-3 h-9 leading-tight text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-l-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                    <i class="fas fa-chevron-left text-xs"></i>
                                </a>
                            </li>
                            <li data-th-each="index : ${#numbers.sequence(0,pageContact.totalPages-1)}">
                                <a data-th-href="@{'/user/contacts?size='+${pageSize}+'&page='+${index}}" href="#"
                                   data-th-classappend="${index==pageContact.number? 'bg-blue-600 text-white border-blue-600' : 'bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400 border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700'}"
                                   class="flex items-center justify-center px-3 h-9 border transition-colors">
                                    <span data-th-text="${index+1}"></span>
                                </a>
                            </li>
                            <li data-th-unless="${pageContact.last}">
                                <a data-th-href="@{'/user/contacts?size='+${pageSize}+'&page=' + ${pageContact.number+1}}" href="#"
                                   class="flex items-center justify-center px-3 h-9 leading-tight text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-r-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                    <i class="fas fa-chevron-right text-xs"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>

                <div class="p-12 text-center" data-th-if="${pageContact.totalElements<=0}">
                    <div class="w-16 h-16 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-address-book text-2xl text-gray-400 dark:text-gray-500"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-1">No contacts found</h3>
                    <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">Try a different search or add a new contact.</p>
                    <a th:href="@{/user/contacts/add}" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition-colors">
                        <i class="fas fa-plus"></i> Add Contact
                    </a>
                </div>
            </div>
        </div>
        <div data-th-replace="~{user/contact_modals :: contact}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@linways/table-to-excel@1.0.4/dist/tableToExcel.min.js"></script>
<script data-th-src="@{'/js/contacts.js'}"></script>
<script>
    function exportData() {
        TableToExcel.convert(document.getElementById("contact-table"), {
            name: "contacts.xlsx",
            sheet: { name: "Sheet 1" }
        });
    }
</script>
</body>
</html>
