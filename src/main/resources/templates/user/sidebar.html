<aside th:fragment="sidebar" id="logo-sidebar" class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full sm:translate-x-0 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700" aria-label="Sidebar">
    <div class="h-full pt-20 px-3 pb-4 overflow-y-auto flex flex-col">
        <div class="flex flex-col items-center mb-8 px-2">
            <div class="relative mb-3">
                <img onerror="this.src='@{/images/logo.png}'" th:src="@{${loggedInUser.profilePic}}" class="h-20 w-20 rounded-full shadow-md object-cover border-4 border-blue-100 dark:border-blue-900/40" alt="Profile">
                <div class="absolute bottom-0 right-0 w-5 h-5 bg-green-500 rounded-full border-2 border-white dark:border-gray-900"></div>
            </div>
            <span class="text-base font-semibold text-gray-900 dark:text-white text-center" th:text="${loggedInUser.name}">User</span>
            <span class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Welcome back!</span>
        </div>

        <ul class="space-y-1 font-medium flex-1">
            <li>
                <a th:href="@{/user/dashboard}" class="flex items-center p-3 text-gray-700 dark:text-gray-300 rounded-xl hover:bg-blue-50 dark:hover:bg-gray-800 hover:text-blue-600 dark:hover:text-blue-400 transition-colors group">
                    <i class="fas fa-tachometer-alt w-5 text-center text-gray-400 dark:text-gray-500 group-hover:text-blue-600 dark:group-hover:text-blue-400"></i>
                    <span class="ms-3">Dashboard</span>
                </a>
            </li>
            <li>
                <a th:href="@{/user/profile}" class="flex items-center p-3 text-gray-700 dark:text-gray-300 rounded-xl hover:bg-blue-50 dark:hover:bg-gray-800 hover:text-blue-600 dark:hover:text-blue-400 transition-colors group">
                    <i class="fas fa-user w-5 text-center text-gray-400 dark:text-gray-500 group-hover:text-blue-600 dark:group-hover:text-blue-400"></i>
                    <span class="ms-3">Profile</span>
                </a>
            </li>
            <li>
                <a th:href="@{/user/contacts/add}" class="flex items-center p-3 text-gray-700 dark:text-gray-300 rounded-xl hover:bg-blue-50 dark:hover:bg-gray-800 hover:text-blue-600 dark:hover:text-blue-400 transition-colors group">
                    <i class="fas fa-plus w-5 text-center text-gray-400 dark:text-gray-500 group-hover:text-blue-600 dark:group-hover:text-blue-400"></i>
                    <span class="ms-3">Add Contact</span>
                </a>
            </li>
            <li>
                <a th:href="@{/user/contacts}" class="flex items-center p-3 text-gray-700 dark:text-gray-300 rounded-xl hover:bg-blue-50 dark:hover:bg-gray-800 hover:text-blue-600 dark:hover:text-blue-400 transition-colors group">
                    <i class="fas fa-address-book w-5 text-center text-gray-400 dark:text-gray-500 group-hover:text-blue-600 dark:group-hover:text-blue-400"></i>
                    <span class="ms-3">Contacts</span>
                </a>
            </li>
            <li>
                <a th:href="@{/user/direct-message}" class="flex items-center p-3 text-gray-700 dark:text-gray-300 rounded-xl hover:bg-blue-50 dark:hover:bg-gray-800 hover:text-blue-600 dark:hover:text-blue-400 transition-colors group">
                    <i class="fas fa-paper-plane w-5 text-center text-gray-400 dark:text-gray-500 group-hover:text-blue-600 dark:group-hover:text-blue-400"></i>
                    <span class="ms-3">Direct Message</span>
                </a>
            </li>
            <li>
                <a th:href="@{/user/feedback}" class="flex items-center p-3 text-gray-700 dark:text-gray-300 rounded-xl hover:bg-blue-50 dark:hover:bg-gray-800 hover:text-blue-600 dark:hover:text-blue-400 transition-colors group">
                    <i class="fas fa-comment w-5 text-center text-gray-400 dark:text-gray-500 group-hover:text-blue-600 dark:group-hover:text-blue-400"></i>
                    <span class="ms-3">Feedback</span>
                </a>
            </li>
        </ul>

        <div class="pt-4 border-t border-gray-200 dark:border-gray-700">
            <a th:href="@{/do-logout}" class="flex items-center p-3 text-red-500 dark:text-red-400 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors group">
                <i class="fas fa-sign-out-alt w-5 text-center"></i>
                <span class="ms-3 font-medium">Logout</span>
            </a>
        </div>
    </div>
</aside>
