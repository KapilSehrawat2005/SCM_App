<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
    <title>Update Contact | SCM</title>
</head>
<body>
<div id="content">
    <div th:if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar :: sidebar}"></div>
    </div>

    <div class="sm:pl-64 pt-20 min-h-screen bg-gray-50 dark:bg-gray-900">
        <div class="p-6 max-w-2xl mx-auto">

            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Update Contact</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Edit and save changes to this contact.</p>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">
                <div data-th-replace="message::messagebox"></div>

                <form class="space-y-5"
                      data-th-action="@{'/user/contacts/update/' + ${contactId}}"
                      data-th-object="${contactForm}"
                      method="post"
                      enctype="multipart/form-data">

                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Contact Name</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                                    <i class="fa-regular fa-user text-gray-400 text-sm"></i>
                                </div>
                                <input data-th-field="*{name}" type="text"
                                       class="w-full pl-10 pr-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm transition-all"
                                       placeholder="Full name">
                            </div>
                            <p class="text-red-500 text-xs mt-1" data-th-if="${#fields.hasErrors('name')}" data-th-errors="*{name}"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Contact Email</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                                    <i class="fa-regular fa-envelope text-gray-400 text-sm"></i>
                                </div>
                                <input type="text" data-th-field="*{email}"
                                       class="w-full pl-10 pr-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm transition-all"
                                       placeholder="example@gmail.com">
                            </div>
                            <p class="text-red-500 text-xs mt-1" data-th-if="${#fields.hasErrors('email')}" data-th-errors="*{email}"></p>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone Number</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                                <i class="fa-solid fa-phone text-gray-400 text-sm"></i>
                            </div>
                            <input data-th-field="*{phoneNumber}" type="text"
                                   class="w-full pl-10 pr-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm transition-all"
                                   placeholder="Phone number">
                        </div>
                        <p class="text-red-500 text-xs mt-1" data-th-if="${#fields.hasErrors('phoneNumber')}" data-th-errors="*{phoneNumber}"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Address</label>
                        <textarea data-th-field="*{address}" rows="3"
                                  class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm transition-all resize-none"
                                  placeholder="Contact address"></textarea>
                        <p class="text-red-500 text-xs mt-1" data-th-if="${#fields.hasErrors('address')}" data-th-errors="*{address}"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Description</label>
                        <textarea data-th-field="*{description}" rows="3"
                                  class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm transition-all resize-none"
                                  placeholder="Write something about this contact"></textarea>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Website Link</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                                    <i class="fa-solid fa-earth-americas text-gray-400 text-sm"></i>
                                </div>
                                <input data-th-field="*{websiteLink}"
                                       class="w-full pl-10 pr-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm transition-all"
                                       placeholder="https://example.com">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">LinkedIn Link</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                                    <i class="fa-brands fa-linkedin text-gray-400 text-sm"></i>
                                </div>
                                <input type="text" data-th-field="*{linkedInLink}"
                                       class="w-full pl-10 pr-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm transition-all"
                                       placeholder="https://linkedin.com/in/username">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Contact Image</label>
                        <input id="image_file_input"
                               class="block w-full text-sm text-gray-700 dark:text-gray-400 border border-gray-300 dark:border-gray-600 rounded-xl cursor-pointer bg-gray-50 dark:bg-gray-700 focus:outline-none file:mr-4 file:py-2 file:px-4 file:rounded-l-xl file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 dark:file:bg-blue-900/30 dark:file:text-blue-400 hover:file:bg-blue-100"
                               data-th-field="*{contactImage}" type="file">
                        <p class="text-red-500 text-xs mt-1" data-th-if="${#fields.hasErrors('contactImage')}" data-th-errors="*{contactImage}"></p>
                        <div class="mt-3 flex justify-center">
                            <img data-th-src="*{picture}" class="max-h-40 rounded-xl shadow" id="upload_image_preview" alt="">
                        </div>
                    </div>

                    <div class="flex items-center space-x-3 p-4
            bg-gray-50 dark:bg-gray-800
            border border-gray-200 dark:border-gray-700
            rounded-xl">

                        <input data-th-field="*{favorite}"
                               type="checkbox"
                               id="favorite_checkbox"
                               class="w-4 h-4 text-blue-600
                  bg-gray-100 border-gray-300 rounded
                  focus:ring-blue-500
                  dark:bg-gray-700
                  dark:border-gray-600">

                        <label for="favorite_checkbox"
                               class="text-sm font-medium
                  text-gray-700 dark:text-white">

                            <i class="fas fa-star text-yellow-400 mr-1"></i>
                            Mark as favorite contact

                        </label>
                    </div>

                    <div class="flex gap-3 pt-2">
                        <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold text-sm transition-colors">
                            <i class="fas fa-save mr-2"></i>Update Contact
                        </button>
                        <button type="reset" class="flex-1 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 py-3 rounded-xl font-semibold text-sm transition-colors">
                            Reset
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script data-th-src="@{'/js/admin.js'}"></script>
<script></script>
</body>
</html>
