<div data-th-fragment="contact">
    <div id="view_contact_modal" tabindex="-1" aria-hidden="true"
         class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
        <div class="relative p-4 w-full max-w-lg max-h-full">
            <div class="relative bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700">

                <div class="flex justify-end p-4 pb-0">
                    <button type="button"
                            class="text-gray-400 hover:text-gray-600 dark:hover:text-white bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-xl w-8 h-8 flex justify-center items-center transition-colors"
                            onclick="closeContactModal()">
                        <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                        </svg>
                        <span class="sr-only">Close modal</span>
                    </button>
                </div>

                <div class="px-6 pb-4 flex flex-col items-center text-center">
                    <img onerror="this.src='https://static-00.iconduck.com/assets.00/profile-default-icon-2048x2045-u3j7s5nj.png'"
                         id="contact_image" class="w-24 h-24 rounded-2xl object-cover shadow-md mb-4" src="" alt="">
                    <h3 id="contact_name" class="text-xl font-bold text-gray-900 dark:text-white"></h3>
                    <p class="text-gray-500 dark:text-gray-400 text-sm mt-0.5" id="contact_email"></p>
                    <p class="text-gray-500 dark:text-gray-400 text-sm" id="contact_phone"></p>
                </div>

                <div class="px-6 pb-6">
                    <div class="bg-gray-50 dark:bg-gray-700/50 rounded-xl overflow-hidden divide-y divide-gray-100 dark:divide-gray-600">
                        <div class="flex items-center gap-4 px-4 py-3">
                            <div class="w-8 h-8 bg-blue-100 dark:bg-blue-900/40 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fa-solid fa-location-dot text-blue-600 dark:text-blue-400 text-xs"></i>
                            </div>
                            <span id="contact_address" class="text-sm text-gray-700 dark:text-gray-300"></span>
                        </div>
                        <div class="flex items-center gap-4 px-4 py-3">
                            <div class="w-8 h-8 bg-purple-100 dark:bg-purple-900/40 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fa-solid fa-user text-purple-600 dark:text-purple-400 text-xs"></i>
                            </div>
                            <span id="contact_about" class="text-sm text-gray-700 dark:text-gray-300"></span>
                        </div>
                        <div class="flex items-center gap-4 px-4 py-3">
                            <div class="w-8 h-8 bg-yellow-100 dark:bg-yellow-900/40 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fa-regular fa-heart text-yellow-600 dark:text-yellow-400 text-xs"></i>
                            </div>
                            <span id="contact_favorite" class="text-sm text-gray-700 dark:text-gray-300"></span>
                        </div>
                        <div class="flex items-center gap-4 px-4 py-3">
                            <div class="w-8 h-8 bg-green-100 dark:bg-green-900/40 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fa-solid fa-earth-americas text-green-600 dark:text-green-400 text-xs"></i>
                            </div>
                            <a id="contact_website" class="text-sm text-blue-600 dark:text-blue-400 hover:underline truncate" target="_blank"></a>
                        </div>
                        <div class="flex items-center gap-4 px-4 py-3">
                            <div class="w-8 h-8 bg-blue-100 dark:bg-blue-900/40 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fa-brands fa-linkedin-in text-blue-700 dark:text-blue-400 text-xs"></i>
                            </div>
                            <a id="contact_linkedIn" class="text-sm text-blue-600 dark:text-blue-400 hover:underline truncate" target="_blank"></a>
                        </div>
                    </div>

                    <div class="mt-4 flex justify-center">
                        <button onclick="closeContactModal()" type="button"
                                class="px-6 py-2.5 text-sm font-medium text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-xl transition-colors">
                            Close
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
