<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{})}">
<head>
    <title th:text="${loggedInUser.name}+' | Profile'">Profile</title>
</head>

<body>

<div id="content">

    <div th:replace="~{user/sidebar :: sidebar}"></div>

    <div class="sm:pl-64 pt-20 min-h-screen bg-gray-50 dark:bg-gray-900">
        <div class="p-6 max-w-2xl mx-auto">

            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">My Profile</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-1">
                    Your account information
                </p>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">

                <div class="bg-gradient-to-r from-blue-600 to-indigo-700 h-24"></div>

                <div class="px-6 pb-6">

                    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between -mt-12 mb-6">

                        <img th:src="@{${loggedInUser.profilePic}}"
                             class="w-24 h-24 rounded-2xl shadow-lg object-cover border-4 border-white dark:border-gray-800"
                             onerror="this.src='https://flowbite.com/docs/images/logo.svg'"
                             alt="Profile">

                        <div class="mt-4 sm:mt-0 flex gap-2">
                            <span class="inline-flex items-center text-xs
                                         bg-green-100 dark:bg-green-900/30
                                         text-green-700 dark:text-green-400
                                         px-3 py-1.5 rounded-full font-medium">

                                <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1.5"></span>
                                Active
                            </span>
                        </div>
                    </div>

                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white"
                        th:text="${loggedInUser.name}"></h2>

                    <p class="text-gray-600 dark:text-gray-300 mt-0.5"
                       th:text="${loggedInUser.email}"></p>

                    <!-- FIXED TEXT COLORS -->
                    <div class="mt-6 grid sm:grid-cols-2 gap-4">

                        <!-- Phone -->
                        <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-xl">
                            <p class="text-xs text-gray-500 dark:text-gray-300 mb-1">
                                Phone Number
                            </p>

                            <p class="font-medium text-gray-800 dark:text-white"
                               th:text="${loggedInUser.phoneNumber != null ? loggedInUser.phoneNumber : 'Not provided'}">
                            </p>
                        </div>

                        <!-- Email Verified -->
                        <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-xl">
                            <p class="text-xs text-gray-500 dark:text-gray-300 mb-1">
                                Email Verified
                            </p>

                            <div class="flex items-center">
                                <span class="w-2 h-2 rounded-full mr-2"
                                      th:classappend="${loggedInUser.emailVerified ? 'bg-green-500' : 'bg-red-400'}">
                                </span>

                                <p class="font-medium text-gray-800 dark:text-white"
                                   th:text="${loggedInUser.emailVerified ? 'Verified' : 'Not Verified'}">
                                </p>
                            </div>
                        </div>

                        <!-- Phone Verified -->
                        <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-xl">
                            <p class="text-xs text-gray-500 dark:text-gray-300 mb-1">
                                Phone Verified
                            </p>

                            <div class="flex items-center">
                                <span class="w-2 h-2 rounded-full mr-2"
                                      th:classappend="${loggedInUser.phoneVerified ? 'bg-green-500' : 'bg-red-400'}">
                                </span>

                                <p class="font-medium text-gray-800 dark:text-white"
                                   th:text="${loggedInUser.phoneVerified ? 'Verified' : 'Not Verified'}">
                                </p>
                            </div>
                        </div>

                        <!-- About -->
                        <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-xl">
                            <p class="text-xs text-gray-500 dark:text-gray-300 mb-1">
                                About
                            </p>

                            <p class="font-medium text-gray-800 dark:text-white text-sm"
                               th:text="${loggedInUser.about != null ? loggedInUser.about : 'No description added'}">
                            </p>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
