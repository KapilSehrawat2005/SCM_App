<!DOCTYPE html>
<html lang="en"
      th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
    <title>Sign Up | Smart Contact Manager</title>
</head>

<body>

<div id="content"
     class="min-h-screen flex items-center justify-center pt-20 pb-10 px-4 bg-gray-50 dark:bg-gray-900">

    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <img th:src="@{/images/logo.png}"
                 class="h-12 w-auto rounded-lg shadow-md mx-auto mb-4"
                 alt="SCM Logo">

            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
                Create your account
            </h1>

            <p class="text-gray-500 dark:text-gray-400 mt-1">
                Start managing contacts on the cloud
            </p>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm
                    border border-gray-200 dark:border-gray-700 p-8">

            <div data-th-replace="message::messagebox"></div>

            <form data-th-action="@{'/do-register'}"
                  method="post"
                  data-th-object="${userForm}"
                  novalidate>

                <!-- Name -->
                <div class="mb-5">
                    <label class="block text-sm font-medium
                                  text-gray-700 dark:text-gray-300 mb-2">
                        Full Name
                    </label>

                    <div class="relative">
                        <input type="text"
                               id="name"
                               data-th-field="*{name}"
                               placeholder="Enter your full name"
                               required
                               class="w-full h-12 pl-12 pr-4
                                      border border-gray-300 dark:border-gray-600
                                      rounded-xl bg-gray-50 dark:bg-gray-700
                                      text-gray-900 dark:text-white
                                      focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <p data-th-if="${#fields.hasErrors('name')}"
                       data-th-errors="*{name}"
                       class="text-red-500 text-xs mt-1"></p>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-medium
                                  text-gray-700 dark:text-gray-300 mb-2">
                        Email Address
                    </label>

                    <div class="relative">

                        <input type="email"
                               id="email"
                               data-th-field="*{email}"
                               placeholder="you@example.com"
                               required
                               class="w-full h-12 pl-12 pr-4
                                      border border-gray-300 dark:border-gray-600
                                      rounded-xl bg-gray-50 dark:bg-gray-700
                                      text-gray-900 dark:text-white
                                      focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <p data-th-if="${#fields.hasErrors('email')}"
                       data-th-errors="*{email}"
                       class="text-red-500 text-xs mt-1"></p>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-medium
                                  text-gray-700 dark:text-gray-300 mb-2">
                        Password
                    </label>

                    <div class="relative">
                        <input type="password"
                               id="password"
                               data-th-field="*{password}"
                               placeholder="Create a strong password"
                               required
                               class="w-full h-12 pl-12 pr-4
                                      border border-gray-300 dark:border-gray-600
                                      rounded-xl bg-gray-50 dark:bg-gray-700
                                      text-gray-900 dark:text-white
                                      focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <p data-th-if="${#fields.hasErrors('password')}"
                       data-th-errors="*{password}"
                       class="text-red-500 text-xs mt-1"></p>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-medium
                                  text-gray-700 dark:text-gray-300 mb-2">
                        Contact Number
                    </label>

                    <div class="relative">
                        <input type="text"
                               id="phone"
                               data-th-field="*{phoneNumber}"
                               placeholder="+91 9876543210"
                               required
                               class="w-full h-12 pl-12 pr-4
                                      border border-gray-300 dark:border-gray-600
                                      rounded-xl bg-gray-50 dark:bg-gray-700
                                      text-gray-900 dark:text-white
                                      focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <p data-th-if="${#fields.hasErrors('phoneNumber')}"
                       data-th-errors="*{phoneNumber}"
                       class="text-red-500 text-xs mt-1"></p>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium
                                  text-gray-700 dark:text-gray-300 mb-2">
                        About You
                    </label>

                    <textarea id="about"
                              rows="3"
                              data-th-field="*{about}"
                              placeholder="Tell us about yourself..."
                              class="w-full px-4 py-3
                                     border border-gray-300 dark:border-gray-600
                                     rounded-xl bg-gray-50 dark:bg-gray-700
                                     text-gray-900 dark:text-white
                                     focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>

                <div class="flex gap-3">
                    <button type="submit"
                            class="flex-1 bg-blue-600 hover:bg-blue-700
                                   text-white py-3 rounded-xl font-semibold">
                        Create Account
                    </button>

                    <button type="reset"
                            class="flex-1 bg-gray-100 dark:bg-gray-700
                                   hover:bg-gray-200 dark:hover:bg-gray-600
                                   text-gray-700 dark:text-gray-300
                                   py-3 rounded-xl font-semibold">
                        Reset
                    </button>
                </div>

            </form>
        </div>

        <p class="text-center text-sm text-gray-500
                  dark:text-gray-400 mt-6">
            Already have an account?
            <a href="/login"
               class="text-blue-600 dark:text-blue-400
                      font-medium hover:underline">
                Sign in
            </a>
        </p>

    </div>
</div>

<script></script>
</body>
</html>
